<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-store">
<title>Voice Test</title>
<style>
  body{ font-family:-apple-system,"Trebuchet MS",sans-serif; background:#ffe3f3; color:#5a2e52; margin:0; padding:18px; }
  h1{ color:#d44ea8; font-size:24px; }
  button{ display:block; width:100%; max-width:560px; font-size:22px; font-weight:bold; color:#fff;
    background:#ff79c6; border:none; border-radius:18px; padding:20px; margin:12px 0; box-shadow:0 5px 0 #d44ea8; }
  button:active{ transform:translateY(3px); box-shadow:0 2px 0 #d44ea8; }
  #log{ background:#fff; border-radius:14px; padding:12px; font-size:14px; white-space:pre-wrap;
    max-width:560px; min-height:160px; border:2px solid #f0c2e0; }
  .ok{color:#1a8a3a;font-weight:bold} .bad{color:#c0392b;font-weight:bold}
</style>
</head>
<body>
<h1>🗣️ Voice Test (fresh file)</h1>
<p>Tap <b>Talk</b>. If nothing, tap it a second time. Then tell me what the box shows and whether you heard a voice.</p>
<button id="talk">▶ Talk</button>
<button id="beeptalk">▶ Beep, then Talk</button>
<div id="log">Ready.</div>
<script>
(function(){
  var log=document.getElementById('log');
  function L(m,c){ var t=new Date().toLocaleTimeString(); log.innerHTML+='\n['+t+'] '+(c?'<span class="'+c+'">'+m+'</span>':m); }
  function clr(){ log.innerHTML='Status:'; }
  var ss=window.speechSynthesis;

  function robustSpeak(){
    if(!ss){ L('speechSynthesis NOT available','bad'); return; }
    var voices=ss.getVoices();
    L('voices: '+voices.length, voices.length?'ok':'bad');
    try{ ss.cancel(); }catch(e){}
    try{ ss.resume(); }catch(e){}
    var u=new SpeechSynthesisUtterance('Hello Avalynn! A, B, C. One, two, three.');
    u.rate=0.9; u.pitch=1.1; u.volume=1; u.lang='en-US';
    var v=null;
    for(var i=0;i<voices.length;i++){ if(/en[-_]US/i.test(voices[i].lang)){ v=voices[i]; break; } }
    if(!v){ for(var j=0;j<voices.length;j++){ if(/^en/i.test(voices[j].lang)){ v=voices[j]; break; } } }
    if(v){ u.voice=v; L('voice: '+v.name+' ['+v.lang+'] local='+v.localService); }
    else L('no English voice found','bad');
    u.onstart=function(){ L('STARTED ✓  (you should hear it now)','ok'); };
    u.onend=function(){ L('ended ✓','ok'); };
    u.onerror=function(ev){ L('ERROR: '+(ev.error||'unknown'),'bad'); };
    ss.speak(u);
    L('spoke. speaking='+ss.speaking+' pending='+ss.pending+' paused='+ss.paused);
    setTimeout(function(){ L('after 1.2s: speaking='+ss.speaking+' pending='+ss.pending+' paused='+ss.paused); },1200);
  }

  document.getElementById('talk').addEventListener('pointerdown',function(e){ e.preventDefault(); clr(); robustSpeak(); });
  document.getElementById('beeptalk').addEventListener('pointerdown',function(e){
    e.preventDefault(); clr();
    try{
      // short HTML5 audio beep (the kind that already works on your iPad)
      var rate=8000,n=2400,buf=new Uint8Array(44+n*2),dv=new DataView(buf.buffer);
      function w(o,s){for(var i=0;i<s.length;i++)dv.setUint8(o+i,s.charCodeAt(i));}
      w(0,'RIFF');dv.setUint32(4,36+n*2,true);w(8,'WAVE');w(12,'fmt ');dv.setUint32(16,16,true);dv.setUint16(20,1,true);dv.setUint16(22,1,true);dv.setUint32(24,rate,true);dv.setUint32(28,rate*2,true);dv.setUint16(32,2,true);dv.setUint16(34,16,true);w(36,'data');dv.setUint32(40,n*2,true);
      for(var i=0;i<n;i++){var val=Math.sin(2*Math.PI*660*i/rate)*0.5;dv.setInt16(44+i*2,val*32767,true);}
      var bin='';for(var k=0;k<buf.length;k++)bin+=String.fromCharCode(buf[k]);
      var a=new Audio('data:audio/wav;base64,'+btoa(bin)); a.play();
      L('played beep, now talking…');
    }catch(e){ L('beep err: '+e,'bad'); }
    setTimeout(robustSpeak,400);
  });
  if(ss) ss.onvoiceschanged=function(){};
})();
</script>
</body>
</html>
