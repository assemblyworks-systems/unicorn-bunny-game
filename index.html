<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Avalynn's Unicorn & Bunny Games</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none; }
  html, body { height:100%; overflow:hidden; touch-action:manipulation; }
  body {
    font-family:"Comic Sans MS","Trebuchet MS",sans-serif;
    background:#ffd6ef; cursor:pointer;
  }
  #app { position:fixed; inset:0; transition:background 0.8s ease; }

  /* ===== Top bar ===== */
  #topbar {
    position:fixed; top:0; left:0; right:0; height:64px; z-index:60;
    display:none; align-items:center; justify-content:space-between; padding:0 12px;
  }
  #backBtn {
    font-family:inherit; font-size:24px; font-weight:bold; color:#fff;
    background:#ff79c6; border:none; border-radius:40px; padding:8px 20px;
    box-shadow:0 4px 0 #d44ea8; cursor:pointer;
  }
  #backBtn:active { transform:translateY(3px); box-shadow:0 1px 0 #d44ea8; }
  #score {
    background:rgba(255,255,255,0.7); border-radius:40px; padding:8px 22px;
    font-size:28px; font-weight:bold; color:#d44ea8; white-space:nowrap;
  }
  #soundBtn {
    font-family:inherit; font-size:24px; background:rgba(255,255,255,0.7);
    border:none; border-radius:40px; padding:8px 16px; cursor:pointer;
  }

  /* ===== Screens ===== */
  .screen { position:fixed; inset:0; }
  .hidden { display:none !important; }

  /* ===== Home menu ===== */
  #home {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:18px; padding:20px; text-align:center;
  }
  #home h1 { font-size:38px; color:#d44ea8; text-shadow:0 3px 0 #fff; }
  #home .big { font-size:84px; animation:bob 1.5s ease-in-out infinite; }
  @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
  #menu { display:grid; grid-template-columns:1fr 1fr; gap:16px; width:100%; max-width:520px; }
  .menu-btn {
    font-family:inherit; font-size:22px; font-weight:bold; color:#7a2e6b;
    background:rgba(255,255,255,0.85); border:none; border-radius:26px;
    padding:18px 10px; box-shadow:0 6px 0 rgba(212,78,168,0.4); cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:6px;
  }
  .menu-btn .emo { font-size:54px; }
  .menu-btn:active { transform:translateY(4px); box-shadow:0 2px 0 rgba(212,78,168,0.4); }

  /* ===== Critters & effects ===== */
  .critter {
    position:absolute; font-size:90px; line-height:1; will-change:transform;
    filter:drop-shadow(0 6px 6px rgba(0,0,0,0.18)); transition:transform 0.08s ease;
  }
  .critter:active { transform:scale(1.2); }
  .pop { animation:pop 0.45s forwards; pointer-events:none; }
  @keyframes pop { 0%{transform:scale(1.3)} 100%{transform:scale(0) rotate(40deg); opacity:0;} }

  .spark { position:absolute; font-size:32px; pointer-events:none; animation:spark 0.7s ease-out forwards; }
  @keyframes spark { 0%{transform:translate(0,0) scale(0.4); opacity:1;} 100%{transform:translate(var(--dx),var(--dy)) scale(1.4); opacity:0;} }

  .cheer {
    position:fixed; left:50%; top:40%; transform:translate(-50%,-50%);
    font-size:54px; font-weight:bold; color:#fff; pointer-events:none; z-index:55;
    text-shadow:0 3px 0 #ff9ad5, 0 0 14px rgba(255,255,255,0.8);
    animation:cheer 1s ease-out forwards; white-space:nowrap; text-align:center;
  }
  @keyframes cheer { 0%{transform:translate(-50%,-50%) scale(0.3); opacity:0;} 25%{transform:translate(-50%,-50%) scale(1.1); opacity:1;} 100%{transform:translate(-50%,-72%) scale(1.1); opacity:0;} }

  /* Feed-the-bunny pet */
  #pet {
    position:absolute; bottom:24px; left:50%; transform:translateX(-50%);
    font-size:130px; z-index:20; filter:drop-shadow(0 8px 8px rgba(0,0,0,0.2));
  }
  .nom { animation:nom 0.4s ease; }
  @keyframes nom { 0%,100%{transform:translateX(-50%) scale(1)} 50%{transform:translateX(-50%) scale(1.25)} }

  .scene-label {
    position:fixed; bottom:14px; left:50%; transform:translateX(-50%);
    background:rgba(255,255,255,0.6); color:#7a2e6b; font-size:18px; font-weight:bold;
    padding:6px 18px; border-radius:30px; z-index:50; pointer-events:none;
  }
</style>
</head>

      <button class="menu-btn" data-mode="stars"><span class="emo">🌟</span>Catch Stars</button>

  </div>

  <!-- PLAY AREA -->
  <div id="play" class="screen hidden"></div>

</div>
