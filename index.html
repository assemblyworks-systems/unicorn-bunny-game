<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Avalynn's Unicorn & Bunny Games</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none; }
  html, body { height:100%; overflow:hidden; touch-action:manipulation; }
  body {
    font-family:"Comic Sans MS","Trebuchet MS",sans-serif;
    background:#ffd6ef; cursor:pointer;
  }
  #app { position:fixed; inset:0; transition:background 0.8s ease; }

  /* ===== Top bar ===== */
  #topbar {
    position:fixed; top:0; left:0; right:0; height:64px; z-index:60;
    display:none; align-items:center; justify-content:space-between; padding:0 12px;
  }
  #backBtn {
    font-family:inherit; font-size:24px; font-weight:bold; color:#fff;
    background:#ff79c6; border:none; border-radius:40px; padding:8px 20px;
    box-shadow:0 4px 0 #d44ea8; cursor:pointer;
  }
  #backBtn:active { transform:translateY(3px); box-shadow:0 1px 0 #d44ea8; }
  #score {
    background:rgba(255,255,255,0.7); border-radius:40px; padding:8px 22px;
    font-size:28px; font-weight:bold; color:#d44ea8; white-space:nowrap;
  }
  #soundBtn {
    font-family:inherit; font-size:24px; background:rgba(255,255,255,0.7);
    border:none; border-radius:40px; padding:8px 16px; cursor:pointer;
  }

  /* ===== Screens ===== */
  .screen { position:fixed; inset:0; }
  .hidden { display:none !important; }

  /* ===== Home menu ===== */
  #home {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:18px; padding:20px; text-align:center;
  }
  #home h1 { font-size:38px; color:#d44ea8; text-shadow:0 3px 0 #fff; }
  #home .big { font-size:84px; animation:bob 1.5s ease-in-out infinite; }
  @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
  #menu { display:grid; grid-template-columns:1fr 1fr; gap:16px; width:100%; max-width:520px; }
  .menu-btn {
    font-family:inherit; font-size:22px; font-weight:bold; color:#7a2e6b;
    background:rgba(255,255,255,0.85); border:none; border-radius:26px;
    padding:18px 10px; box-shadow:0 6px 0 rgba(212,78,168,0.4); cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:6px;
  }
  .menu-btn .emo { font-size:54px; }
  .menu-btn:active { transform:translateY(4px); box-shadow:0 2px 0 rgba(212,78,168,0.4); }

  /* ===== Critters & effects ===== */
  .critter {
    position:absolute; font-size:90px; line-height:1; will-change:transform;
    filter:drop-shadow(0 6px 6px rgba(0,0,0,0.18)); transition:transform 0.08s ease;
  }
  .critter:active { transform:scale(1.2); }
  .pop { animation:pop 0.45s forwards; pointer-events:none; }
  @keyframes pop { 0%{transform:scale(1.3)} 100%{transform:scale(0) rotate(40deg); opacity:0;} }

  .spark { position:absolute; font-size:32px; pointer-events:none; animation:spark 0.7s ease-out forwards; }
  @keyframes spark { 0%{transform:translate(0,0) scale(0.4); opacity:1;} 100%{transform:translate(var(--dx),var(--dy)) scale(1.4); opacity:0;} }

  .cheer {
    position:fixed; left:50%; top:40%; transform:translate(-50%,-50%);
    font-size:54px; font-weight:bold; color:#fff; pointer-events:none; z-index:55;
    text-shadow:0 3px 0 #ff9ad5, 0 0 14px rgba(255,255,255,0.8);
    animation:cheer 1s ease-out forwards; white-space:nowrap; text-align:center;
  }
  @keyframes cheer { 0%{transform:translate(-50%,-50%) scale(0.3); opacity:0;} 25%{transform:translate(-50%,-50%) scale(1.1); opacity:1;} 100%{transform:translate(-50%,-72%) scale(1.1); opacity:0;} }

  /* Feed-the-bunny pet */
  #pet {
    position:absolute; bottom:24px; left:50%; transform:translateX(-50%);
    font-size:130px; z-index:20; filter:drop-shadow(0 8px 8px rgba(0,0,0,0.2));
  }
  .nom { animation:nom 0.4s ease; }
  @keyframes nom { 0%,100%{transform:translateX(-50%) scale(1)} 50%{transform:translateX(-50%) scale(1.25)} }

  .scene-label {
    position:fixed; bottom:14px; left:50%; transform:translateX(-50%);
    background:rgba(255,255,255,0.6); color:#7a2e6b; font-size:18px; font-weight:bold;
    padding:6px 18px; border-radius:30px; z-index:50; pointer-events:none;
  }
</style>
</head>
<body>
<div id="app">

  <div id="topbar">
    <button id="backBtn">⟵ Home</button>
    <div id="score">⭐ 0</div>
    <button id="soundBtn">🔊</button>
  </div>

  <!-- HOME -->
  <div id="home" class="screen">
    <div class="big">🦄🐰</div>
    <h1>Avalynn's<br>Magic Games</h1>
    <div id="menu">
      <button class="menu-btn" data-mode="friends"><span class="emo">🦄</span>Tap Friends</button>
      <button class="menu-btn" data-mode="balloons"><span class="emo">🎈</span>Pop Balloons</button>
      <button class="menu-btn" data-mode="feed"><span class="emo">🥕</span>Feed Bunny</button>
      <button class="menu-btn" data-mode="stars"><span class="emo">🌟</span>Catch Stars</button>
    </div>
  </div>

  <!-- PLAY AREA -->
  <div id="play" class="screen hidden"></div>

</div>

<script>
(function () {
  const app = document.getElementById('app');
  const home = document.getElementById('home');
  const play = document.getElementById('play');
  const topbar = document.getElementById('topbar');
  const backBtn = document.getElementById('backBtn');
  const soundBtn = document.getElementById('soundBtn');
  const scoreEl = document.getElementById('score');

  const NAME = 'Avalynn';

  // ---- content pools ----
  const FRIENDS = ['🦄','🐰','🐱','🐶','🦋','🌷','🌈','⭐','🐥','🐢'];
  const SPARKS  = ['✨','💖','⭐','🌟','💕','🌸'];
  const CHEERS  = ['Yay!','Wow!','Yippee!','Hooray!','Magic!','So pretty!','Amazing!'];
  const BALLOON_COLORS = [
    {e:'🔴', name:'red'}, {e:'🟠', name:'orange'}, {e:'🟡', name:'yellow'},
    {e:'🟢', name:'green'}, {e:'🔵', name:'blue'}, {e:'🟣', name:'purple'}, {e:'🩷', name:'pink'}
  ];
  const SCENES = [
    {name:'🌸 Flower Garden', bg:'linear-gradient(160deg,#d6ffe0,#fff6c2)'},
    {name:'🏰 Magic Castle',  bg:'linear-gradient(160deg,#e3d6ff,#ffd6ef)'},
    {name:'🌙 Starry Night',  bg:'linear-gradient(160deg,#3a2a6b,#7a5ec2)'},
    {name:'🌈 Rainbow Sky',   bg:'linear-gradient(160deg,#ffd6ef,#d6e8ff,#e3d6ff)'},
    {name:'☀️ Sunny Meadow',  bg:'linear-gradient(160deg,#fff4c2,#bdeaff)'}
  ];

  let score = 0;
  let mode = null;
  let soundOn = true;
  let audioCtx = null;
  let timers = [];
  let listeners = [];

  // ---------- audio ----------
  function initAudio() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (e) { audioCtx = null; }
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }
  function chime(base) {
    if (!soundOn || !audioCtx) return;
    const now = audioCtx.currentTime;
    const root = base || 523.25;
    [root, root*1.26, root*1.5].forEach((f,i) => {
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type='sine'; o.frequency.value=f;
      g.gain.setValueAtTime(0.0001, now+i*0.06);
      g.gain.exponentialRampToValueAtTime(0.22, now+i*0.06+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, now+i*0.06+0.32);
      o.connect(g).connect(audioCtx.destination);
      o.start(now+i*0.06); o.stop(now+i*0.06+0.36);
    });
  }
  function say(text) {
    if (!soundOn || !('speechSynthesis' in window)) return;
    try {
      const u = new SpeechSynthesisUtterance(text);
      u.rate = 0.95; u.pitch = 1.4; u.volume = 1;
      const vs = speechSynthesis.getVoices();
      const pref = vs.find(v=>/female|samantha|karen|zira|google uk english female|tessa/i.test(v.name))
                 || vs.find(v=>/en/i.test(v.lang));
      if (pref) u.voice = pref;
      speechSynthesis.cancel();
      speechSynthesis.speak(u);
    } catch(e) {}
  }
  if ('speechSynthesis' in window) speechSynthesis.onvoiceschanged = ()=>{};

  // ---------- helpers ----------
  function rnd(a,b){ return Math.random()*(b-a)+a; }
  function pick(a){ return a[Math.floor(Math.random()*a.length)]; }
  function setScore(n){ score=n; scoreEl.textContent='⭐ '+score; }
  function trackTimer(id){ timers.push(id); }
  function clearTimers(){ timers.forEach(t=>{clearTimeout(t);clearInterval(t);}); timers=[]; }

  function burst(x,y){
    for(let i=0;i<8;i++){
      const s=document.createElement('div'); s.className='spark'; s.textContent=pick(SPARKS);
      s.style.left=x+'px'; s.style.top=y+'px';
      const ang=(Math.PI*2/8)*i, d=rnd(60,120);
      s.style.setProperty('--dx',Math.cos(ang)*d+'px');
      s.style.setProperty('--dy',Math.sin(ang)*d+'px');
      play.appendChild(s);
      s.addEventListener('animationend',()=>s.remove(),{once:true});
    }
  }
  function cheerText(t){
    const el=document.createElement('div'); el.className='cheer'; el.textContent=t;
    document.body.appendChild(el);
    el.addEventListener('animationend',()=>el.remove(),{once:true});
  }

  // praise: counts, names Avalynn, says colors
  function reward(opts){
    opts = opts || {};
    chime(opts.base);
    const visual = opts.count ? String(score) : pick(CHEERS);
    cheerText(visual);
    // spoken: count number, sometimes name, sometimes color
    let speech = '';
    if (opts.count) speech = String(score);
    if (opts.color) speech = opts.color + (Math.random()<0.5? ' '+pick(CHEERS):'');
    if (!speech) speech = pick(CHEERS);
    if (Math.random() < 0.4) speech = speech + ' ' + NAME + '!';
    say(speech);
  }

  function applyScene(i){
    const s = SCENES[i % SCENES.length];
    app.style.background = s.bg;
    let lbl = document.querySelector('.scene-label');
    if(!lbl){ lbl=document.createElement('div'); lbl.className='scene-label'; document.body.appendChild(lbl); }
    lbl.textContent = s.name;
  }

  // ---------- MODE: Tap Friends ----------
  function spawnFriend(){
    const c=document.createElement('div'); c.className='critter'; c.textContent=pick(FRIENDS);
    const size=rnd(74,116); c.style.fontSize=size+'px';
    c.style.left=rnd(10,Math.max(10,window.innerWidth-size))+'px';
    c.style.top =rnd(74,Math.max(90,window.innerHeight-size))+'px';
    let t=Math.random()*6;
    function drift(){ if(!c.isConnected||c.classList.contains('pop'))return;
      t+=0.03; c.style.transform='translateY('+Math.sin(t)*10+'px)'; requestAnimationFrame(drift); }
    requestAnimationFrame(drift);
    c.addEventListener('pointerdown',e=>{
      e.preventDefault(); e.stopPropagation();
      if(c.classList.contains('pop'))return;
      const r=c.getBoundingClientRect();
      burst(r.left+r.width/2, r.top+r.height/2);
      setScore(score+1);
      reward({count:true});
      if(score % 8 === 0) applyScene(score/8);
      c.classList.add('pop');
      c.addEventListener('animationend',()=>{c.remove(); spawnFriend();},{once:true});
    });
    play.appendChild(c);
  }
  function startFriends(){ applyScene(0); for(let i=0;i<5;i++) spawnFriend(); say('Tap the friends, '+NAME+'!'); }

  // ---------- MODE: Pop Balloons ----------
  function spawnBalloon(){
    const col=pick(BALLOON_COLORS);
    const b=document.createElement('div'); b.className='critter'; b.textContent=col.e;
    b.dataset.color=col.name;
    const size=rnd(80,120); b.style.fontSize=size+'px';
    const x=rnd(10,Math.max(10,window.innerWidth-size));
    b.style.left=x+'px'; b.style.top=window.innerHeight+'px';
    play.appendChild(b);
    let y=window.innerHeight; const speed=rnd(0.8,1.8);
    const id=setInterval(()=>{
      if(!b.isConnected||b.classList.contains('pop')){clearInterval(id);return;}
      y-=speed; b.style.top=y+'px';
      b.style.transform='translateX('+Math.sin(y/40)*14+'px)';
      if(y < -size){ clearInterval(id); b.remove(); spawnBalloon(); }
    },16); trackTimer(id);
    b.addEventListener('pointerdown',e=>{
      e.preventDefault(); e.stopPropagation();
      if(b.classList.contains('pop'))return;
      clearInterval(id);
      const r=b.getBoundingClientRect();
      burst(r.left+r.width/2,r.top+r.height/2);
      setScore(score+1);
      reward({color:b.dataset.color});
      b.classList.add('pop');
      b.addEventListener('animationend',()=>{b.remove(); spawnBalloon();},{once:true});
    });
  }
  function startBalloons(){ applyScene(3); for(let i=0;i<4;i++){ const t=setTimeout(spawnBalloon,i*500); trackTimer(t);} say('Pop the balloons, '+NAME+'!'); }

  // ---------- MODE: Feed Bunny ----------
  function startFeed(){
    applyScene(0);
    const pet=document.createElement('div'); pet.id='pet'; pet.textContent='🐰'; play.appendChild(pet);
    function spawnCarrot(){
      const c=document.createElement('div'); c.className='critter'; c.textContent='🥕';
      const size=rnd(64,90); c.style.fontSize=size+'px';
      c.style.left=rnd(10,Math.max(10,window.innerWidth-size))+'px';
      c.style.top =rnd(80,Math.max(100,window.innerHeight-260))+'px';
      let t=Math.random()*6;
      function drift(){ if(!c.isConnected||c.classList.contains('pop'))return;
        t+=0.04; c.style.transform='rotate('+Math.sin(t)*12+'deg)'; requestAnimationFrame(drift);}
      requestAnimationFrame(drift);
      c.addEventListener('pointerdown',e=>{
        e.preventDefault(); e.stopPropagation();
        if(c.classList.contains('pop'))return;
        const r=c.getBoundingClientRect();
        burst(r.left+r.width/2,r.top+r.height/2);
        setScore(score+1);
        pet.classList.remove('nom'); void pet.offsetWidth; pet.classList.add('nom');
        chime();
        cheerText(pick(['Yum!','Nom nom!','Thank you!','Crunch!']));
        say(pick(['Yum yum','Thank you '+NAME,'Nom nom nom','Crunchy','Delicious']));
        c.classList.add('pop');
        c.addEventListener('animationend',()=>{c.remove(); spawnCarrot();},{once:true});
      });
      play.appendChild(c);
    }
    for(let i=0;i<3;i++) spawnCarrot();
    say('Feed the carrots to the bunny, '+NAME+'!');
  }

  // ---------- MODE: Catch Stars ----------
  function startStars(){
    applyScene(2);
    function spawnStar(){
      const e=pick(['⭐','🌟','✨','💫']);
      const s=document.createElement('div'); s.className='critter'; s.textContent=e;
      const size=rnd(64,104); s.style.fontSize=size+'px';
      const x=rnd(10,Math.max(10,window.innerWidth-size));
      s.style.left=x+'px'; let y=-size; s.style.top=y+'px';
      play.appendChild(s);
      const speed=rnd(1.2,2.6);
      const id=setInterval(()=>{
        if(!s.isConnected||s.classList.contains('pop')){clearInterval(id);return;}
        y+=speed; s.style.top=y+'px';
        s.style.transform='rotate('+(y/3)+'deg)';
        if(y>window.innerHeight){ clearInterval(id); s.remove(); }
      },16); trackTimer(id);
      s.addEventListener('pointerdown',ev=>{
        ev.preventDefault(); ev.stopPropagation();
        if(s.classList.contains('pop'))return;
        clearInterval(id);
        const r=s.getBoundingClientRect();
        burst(r.left+r.width/2,r.top+r.height/2);
        setScore(score+1);
        reward({count:true});
        s.classList.add('pop');
        s.addEventListener('animationend',()=>s.remove(),{once:true});
      });
    }
    const id=setInterval(spawnStar, 900); trackTimer(id);
    for(let i=0;i<3;i++) spawnStar();
    say('Catch the falling stars, '+NAME+'!');
  }

  // ---------- navigation ----------
  function openMode(m){
    initAudio();
    mode=m; setScore(0);
    play.innerHTML='';
    home.classList.add('hidden');
    play.classList.remove('hidden');
    topbar.style.display='flex';
    if(m==='friends') startFriends();
    else if(m==='balloons') startBalloons();
    else if(m==='feed') startFeed();
    else if(m==='stars') startStars();
  }
  function goHome(){
    clearTimers();
    if('speechSynthesis' in window) speechSynthesis.cancel();
    play.innerHTML='';
    play.classList.add('hidden');
    topbar.style.display='none';
    const lbl=document.querySelector('.scene-label'); if(lbl) lbl.remove();
    home.classList.remove('hidden');
    app.style.background='#ffd6ef';
    mode=null;
  }

  document.querySelectorAll('.menu-btn').forEach(btn=>{
    btn.addEventListener('pointerdown',e=>{ e.preventDefault(); openMode(btn.dataset.mode); });
  });
  backBtn.addEventListener('pointerdown',e=>{ e.preventDefault(); goHome(); });
  soundBtn.addEventListener('pointerdown',e=>{
    e.preventDefault(); soundOn=!soundOn;
    soundBtn.textContent = soundOn ? '🔊' : '🔇';
    if(soundOn) initAudio();
  });

  window.addEventListener('resize', ()=>{
    play.querySelectorAll('.critter').forEach(c=>{
      const size=parseFloat(c.style.fontSize)||90;
      const maxX=window.innerWidth-size;
      if(parseFloat(c.style.left)>maxX) c.style.left=Math.max(10,maxX)+'px';
    });
  });
})();
</script>
</body>
</html>
