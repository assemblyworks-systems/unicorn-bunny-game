<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Avalynn's Unicorn & Bunny Games</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#ffd6ef">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Avalynn's Games">
<link rel="apple-touch-icon" href="icon.png">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none; }
  html, body { height:100%; overflow:hidden; touch-action:manipulation; }
  body {
    font-family:"Comic Sans MS","Trebuchet MS",sans-serif;
    background:#ffd6ef; cursor:pointer;
  }
  #app { position:fixed; inset:0; transition:background 0.8s ease; }

  /* ===== Top bar ===== */
  #topbar {
    position:fixed; top:0; left:0; right:0; height:64px; z-index:60;
    display:none; align-items:center; justify-content:space-between; padding:0 12px;
  }
  #backBtn {
    font-family:inherit; font-size:24px; font-weight:bold; color:#fff;
    background:#ff79c6; border:none; border-radius:40px; padding:8px 20px;
    box-shadow:0 4px 0 #d44ea8; cursor:pointer;
  }
  #backBtn:active { transform:translateY(3px); box-shadow:0 1px 0 #d44ea8; }
  #score {
    background:rgba(255,255,255,0.7); border-radius:40px; padding:8px 22px;
    font-size:28px; font-weight:bold; color:#d44ea8; white-space:nowrap;
  }
  #soundBtn {
    font-family:inherit; font-size:24px; background:rgba(255,255,255,0.7);
    border:none; border-radius:40px; padding:8px 16px; cursor:pointer;
  }

  /* ===== Screens ===== */
  .screen { position:fixed; inset:0; }
  .hidden { display:none !important; }

  /* ===== Home menu ===== */
  #home {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:18px; padding:20px; text-align:center;
  }
  #home h1 { font-size:38px; color:#d44ea8; text-shadow:0 3px 0 #fff; }
  #home .big { font-size:84px; animation:bob 1.5s ease-in-out infinite; }
  @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
  #menu { display:grid; grid-template-columns:1fr 1fr; gap:16px; width:100%; max-width:520px; }
  .menu-btn {
    font-family:inherit; font-size:22px; font-weight:bold; color:#7a2e6b;
    background:rgba(255,255,255,0.85); border:none; border-radius:26px;
    padding:18px 10px; box-shadow:0 6px 0 rgba(212,78,168,0.4); cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:6px;
  }
  .menu-btn .emo { font-size:54px; }
  .menu-btn:active { transform:translateY(4px); box-shadow:0 2px 0 rgba(212,78,168,0.4); }

  /* ===== Critters & effects ===== */
  .critter {
    position:absolute; font-size:90px; line-height:1; will-change:transform;
    filter:drop-shadow(0 6px 6px rgba(0,0,0,0.18)); transition:transform 0.08s ease;
  }
  .critter:active { transform:scale(1.2); }
  .pop { animation:pop 0.45s forwards; pointer-events:none; }
  @keyframes pop { 0%{transform:scale(1.3)} 100%{transform:scale(0) rotate(40deg); opacity:0;} }

  .spark { position:absolute; font-size:32px; pointer-events:none; animation:spark 0.7s ease-out forwards; }
  @keyframes spark { 0%{transform:translate(0,0) scale(0.4); opacity:1;} 100%{transform:translate(var(--dx),var(--dy)) scale(1.4); opacity:0;} }

  .shake { animation:shake 0.4s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-12px) rotate(-8deg)} 75%{transform:translateX(12px) rotate(8deg)} }
  .match-banner {
    position:fixed; top:72px; left:50%; transform:translateX(-50%); z-index:55;
    background:rgba(255,255,255,0.9); border-radius:40px; padding:8px 22px;
    font-family:inherit; font-size:22px; font-weight:bold; color:#d44ea8;
    display:flex; align-items:center; gap:10px; pointer-events:none; white-space:nowrap;
    box-shadow:0 4px 0 rgba(212,78,168,0.3);
  }
  .match-banner .big { font-size:46px; }

  .cheer {
    position:fixed; left:50%; top:40%; transform:translate(-50%,-50%);
    font-size:54px; font-weight:bold; color:#fff; pointer-events:none; z-index:55;
    text-shadow:0 3px 0 #ff9ad5, 0 0 14px rgba(255,255,255,0.8);
    animation:cheer 1s ease-out forwards; white-space:nowrap; text-align:center;
  }
  @keyframes cheer { 0%{transform:translate(-50%,-50%) scale(0.3); opacity:0;} 25%{transform:translate(-50%,-50%) scale(1.1); opacity:1;} 100%{transform:translate(-50%,-72%) scale(1.1); opacity:0;} }

  /* Feed-the-bunny pet */
  #pet {
    position:absolute; bottom:24px; left:50%; transform:translateX(-50%);
    font-size:130px; z-index:20; filter:drop-shadow(0 8px 8px rgba(0,0,0,0.2));
  }
  .nom { animation:nom 0.4s ease; }
  @keyframes nom { 0%,100%{transform:translateX(-50%) scale(1)} 50%{transform:translateX(-50%) scale(1.25)} }

  .scene-label {
    position:fixed; bottom:14px; left:50%; transform:translateX(-50%);
    background:rgba(255,255,255,0.6); color:#7a2e6b; font-size:18px; font-weight:bold;
    padding:6px 18px; border-radius:30px; z-index:50; pointer-events:none;
  }
</style>
</head>
<body>
<div id="app">

  <div id="topbar">
    <button id="backBtn">⟵ Home</button>
    <div id="score">⭐ 0</div>
    <button id="soundBtn">🔊</button>
  </div>

  <!-- HOME -->
  <div id="home" class="screen">
    <div class="big">🦄🐰</div>
    <h1>Avalynn's<br>Magic Games</h1>
    <div id="menu">
      <button class="menu-btn" data-mode="friends"><span class="emo">🔎</span>Match It</button>
      <button class="menu-btn" data-mode="balloons"><span class="emo">🎈</span>Pop Balloons</button>
      <button class="menu-btn" data-mode="feed"><span class="emo">🥕</span>Feed Bunny</button>
      <button class="menu-btn" data-mode="stars"><span class="emo">🌟</span>Catch Stars</button>
    </div>
    <a href="learn.html" style="margin-top:18px;display:inline-flex;align-items:center;gap:8px;text-decoration:none;font-family:inherit;font-size:20px;font-weight:bold;color:#fff;background:#a86bd6;border-radius:40px;padding:12px 26px;box-shadow:0 5px 0 #7d49a8;">📚 Learn ABC &amp; 123</a>
  </div>

  <!-- PLAY AREA -->
  <div id="play" class="screen hidden"></div>

</div>

<script>
(function () {
  const app = document.getElementById('app');
  const home = document.getElementById('home');
  const play = document.getElementById('play');
  const topbar = document.getElementById('topbar');
  const backBtn = document.getElementById('backBtn');
  const soundBtn = document.getElementById('soundBtn');
  const scoreEl = document.getElementById('score');

  const NAME = 'Avalynn';

  // ---- content pools ----
  const FRIENDS = ['🦄','🐰','🐱','🐶','🦋','🌷','🌈','⭐','🐥','🐢'];
  const SPARKS  = ['✨','💖','⭐','🌟','💕','🌸'];
  const CHEERS  = ['Yay!','Wow!','Yippee!','Hooray!','Magic!','So pretty!','Amazing!'];
  const BALLOON_COLORS = [
    {e:'🔴', name:'red'}, {e:'🟠', name:'orange'}, {e:'🟡', name:'yellow'},
    {e:'🟢', name:'green'}, {e:'🔵', name:'blue'}, {e:'🟣', name:'purple'}, {e:'🩷', name:'pink'}
  ];
  const SCENES = [
    {name:'🌸 Flower Garden', bg:'linear-gradient(160deg,#d6ffe0,#fff6c2)'},
    {name:'🏰 Magic Castle',  bg:'linear-gradient(160deg,#e3d6ff,#ffd6ef)'},
    {name:'🌙 Starry Night',  bg:'linear-gradient(160deg,#3a2a6b,#7a5ec2)'},
    {name:'🌈 Rainbow Sky',   bg:'linear-gradient(160deg,#ffd6ef,#d6e8ff,#e3d6ff)'},
    {name:'☀️ Sunny Meadow',  bg:'linear-gradient(160deg,#fff4c2,#bdeaff)'}
  ];

  let score = 0;
  let mode = null;
  let soundOn = true;
  let audioCtx = null;
  let timers = [];
  let listeners = [];

  // ---------- audio ----------
  function initAudio() {}
  function makeWav(segs){ const rate=11025; let total=0; segs.forEach(s=>total+=Math.floor(rate*s.ms/1000)); const buf=new Uint8Array(44+total*2), dv=new DataView(buf.buffer); const w=(o,str)=>{for(let i=0;i<str.length;i++)dv.setUint8(o+i,str.charCodeAt(i));}; w(0,'RIFF');dv.setUint32(4,36+total*2,true);w(8,'WAVE');w(12,'fmt ');dv.setUint32(16,16,true);dv.setUint16(20,1,true);dv.setUint16(22,1,true);dv.setUint32(24,rate,true);dv.setUint32(28,rate*2,true);dv.setUint16(32,2,true);dv.setUint16(34,16,true);w(36,'data');dv.setUint32(40,total*2,true); let off=44; segs.forEach(s=>{const n=Math.floor(rate*s.ms/1000); for(let i=0;i<n;i++){const env=Math.min(1,i/(rate*0.01))*Math.min(1,(n-i)/(rate*0.05)); const v=Math.sin(2*Math.PI*s.f*i/rate)*0.5*env; dv.setInt16(off,v*32767,true); off+=2;}}); let bin=''; for(let i=0;i<buf.length;i++)bin+=String.fromCharCode(buf[i]); return 'data:audio/wav;base64,'+btoa(bin); }
  const SND={ good:makeWav([{f:523,ms:90},{f:659,ms:90},{f:784,ms:170}]), wrong:makeWav([{f:300,ms:130},{f:200,ms:170}]), tap:makeWav([{f:880,ms:70}]) };
  function playSnd(uri,vol){ if(!soundOn) return; try{ const a=new Audio(uri); a.volume=vol==null?1:vol; const p=a.play(); if(p&&p.catch)p.catch(()=>{}); }catch(e){} }
  function chime(base) { playSnd(SND.good); }
  function say(text) {
    if (!soundOn || !('speechSynthesis' in window)) return;
    try {
      const u = new SpeechSynthesisUtterance(text);
      u.rate = 0.95; u.pitch = 1.4; u.volume = 1;
      const vs = speechSynthesis.getVoices();
      const pref = vs.find(v=>/female|samantha|karen|zira|google uk english female|tessa/i.test(v.name))
                 || vs.find(v=>/en/i.test(v.lang));
      if (pref) u.voice = pref;
      speechSynthesis.cancel();
      speechSynthesis.speak(u);
    } catch(e) {}
  }
  if ('speechSynthesis' in window) speechSynthesis.onvoiceschanged = ()=>{};

  // ---- mobile audio unlock (Chrome/Safari require a user gesture) ----
  let _audioPrimed = false;
  function ensureAudio(){
    initAudio();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    if (!_audioPrimed) {
      _audioPrimed = true;
      playSnd(SND.tap,0.5);
      if ('speechSynthesis' in window) { try { const u=new SpeechSynthesisUtterance(' '); u.volume=0; speechSynthesis.speak(u); } catch(e){} }
    }
  }
  document.addEventListener('pointerdown', ensureAudio, true);
  document.addEventListener('touchend', ensureAudio, true);

  // ---------- helpers ----------
  function rnd(a,b){ return Math.random()*(b-a)+a; }
  function pick(a){ return a[Math.floor(Math.random()*a.length)]; }
  function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
  function setScore(n){ score=Math.max(0,n); scoreEl.textContent='⭐ '+score; }
  function bonk(){ playSnd(SND.wrong,0.7); }
  function trackTimer(id){ timers.push(id); }
  function clearTimers(){ timers.forEach(t=>{clearTimeout(t);clearInterval(t);}); timers=[]; }

  function burst(x,y){
    for(let i=0;i<8;i++){
      const s=document.createElement('div'); s.className='spark'; s.textContent=pick(SPARKS);
      s.style.left=x+'px'; s.style.top=y+'px';
      const ang=(Math.PI*2/8)*i, d=rnd(60,120);
      s.style.setProperty('--dx',Math.cos(ang)*d+'px');
      s.style.setProperty('--dy',Math.sin(ang)*d+'px');
      play.appendChild(s);
      s.addEventListener('animationend',()=>s.remove(),{once:true});
    }
  }
  function cheerText(t){
    const el=document.createElement('div'); el.className='cheer'; el.textContent=t;
    document.body.appendChild(el);
    el.addEventListener('animationend',()=>el.remove(),{once:true});
  }

  // praise: counts, names Avalynn, says colors
  function reward(opts){
    opts = opts || {};
    chime(opts.base);
    const visual = opts.count ? String(score) : pick(CHEERS);
    cheerText(visual);
    // spoken: count number, sometimes name, sometimes color
    let speech = '';
    if (opts.count) speech = String(score);
    if (opts.color) speech = opts.color + (Math.random()<0.5? ' '+pick(CHEERS):'');
    if (!speech) speech = pick(CHEERS);
    if (Math.random() < 0.4) speech = speech + ' ' + NAME + '!';
    say(speech);
  }

  function applyScene(i){
    const s = SCENES[i % SCENES.length];
    app.style.background = s.bg;
    let lbl = document.querySelector('.scene-label');
    if(!lbl){ lbl=document.createElement('div'); lbl.className='scene-label'; document.body.appendChild(lbl); }
    lbl.textContent = s.name;
  }

  // ---------- MODE: Match It (tap the matching items) ----------
  function spawnMatchItem(emo, target, onMatch){
    const c=document.createElement('div'); c.className='critter'; c.textContent=emo;
    const size=rnd(74,108); c.style.fontSize=size+'px';
    c.style.left=rnd(10,Math.max(10,window.innerWidth-size))+'px';
    c.style.top =rnd(140,Math.max(160,window.innerHeight-size-20))+'px';
    let t=Math.random()*6;
    function drift(){ if(!c.isConnected||c.classList.contains('pop'))return;
      t+=0.03; c.style.transform='translateY('+Math.sin(t)*10+'px)'; requestAnimationFrame(drift); }
    requestAnimationFrame(drift);
    c.addEventListener('pointerdown',e=>{
      e.preventDefault(); e.stopPropagation();
      if(c.classList.contains('pop')||c.classList.contains('shake'))return;
      if(emo===target){
        const r=c.getBoundingClientRect();
        burst(r.left+r.width/2, r.top+r.height/2);
        setScore(score+1); reward({count:true});
        c.classList.add('pop');
        c.addEventListener('animationend',()=>{ c.remove(); onMatch(); },{once:true});
      } else {
        bonk(); say(pick(['Not that one','Try again','Look again']));
        c.classList.add('shake');
        c.addEventListener('animationend',()=>c.classList.remove('shake'),{once:true});
      }
    });
    play.appendChild(c);
  }
  function newMatchRound(){
    play.innerHTML='';
    const target=pick(FRIENDS);
    const banner=document.createElement('div'); banner.className='match-banner';
    banner.innerHTML='Tap all the <span class="big">'+target+'</span>';
    play.appendChild(banner);
    const others=shuffle(FRIENDS.filter(f=>f!==target));
    const matchCount=2+Math.floor(Math.random()*2);   // 2-3 to find
    const distractCount=3+Math.floor(Math.random()*3); // 3-5 others
    const items=[]; for(let i=0;i<matchCount;i++) items.push(target);
    for(let i=0;i<distractCount;i++) items.push(others[i%others.length]);
    let remaining=matchCount;
    shuffle(items).forEach(emo=>spawnMatchItem(emo,target,()=>{
      remaining--;
      if(remaining<=0){ cheerText(pick(CHEERS)); applyScene((score/6)|0); const t=setTimeout(newMatchRound,800); trackTimer(t); }
    }));
  }
  function startFriends(){ applyScene(0); newMatchRound(); say('Tap all the ones that are the same, '+NAME+'!'); }

  // ---------- MODE: Pop Balloons ----------
  function spawnBalloon(){
    const col=pick(BALLOON_COLORS);
    const b=document.createElement('div'); b.className='critter'; b.textContent=col.e;
    b.dataset.color=col.name;
    const size=rnd(80,120); b.style.fontSize=size+'px';
    const x=rnd(10,Math.max(10,window.innerWidth-size));
    b.style.left=x+'px'; b.style.top=window.innerHeight+'px';
    play.appendChild(b);
    let y=window.innerHeight; const speed=rnd(0.8,1.8);
    const id=setInterval(()=>{
      if(!b.isConnected||b.classList.contains('pop')){clearInterval(id);return;}
      y-=speed; b.style.top=y+'px';
      b.style.transform='translateX('+Math.sin(y/40)*14+'px)';
      if(y < -size){ clearInterval(id); b.remove(); spawnBalloon(); }
    },16); trackTimer(id);
    b.addEventListener('pointerdown',e=>{
      e.preventDefault(); e.stopPropagation();
      if(b.classList.contains('pop'))return;
      clearInterval(id);
      const r=b.getBoundingClientRect();
      burst(r.left+r.width/2,r.top+r.height/2);
      setScore(score+1);
      reward({color:b.dataset.color});
      b.classList.add('pop');
      b.addEventListener('animationend',()=>{b.remove(); spawnBalloon();},{once:true});
    });
  }
  function startBalloons(){ applyScene(3); for(let i=0;i<4;i++){ const t=setTimeout(spawnBalloon,i*500); trackTimer(t);} say('Pop the balloons, '+NAME+'!'); }

  // ---------- MODE: Feed Bunny ----------
  function startFeed(){
    applyScene(0);
    const pet=document.createElement('div'); pet.id='pet'; pet.textContent='🐰'; play.appendChild(pet);
    function spawnCarrot(){
      const c=document.createElement('div'); c.className='critter'; c.textContent='🥕';
      const size=rnd(64,90); c.style.fontSize=size+'px';
      c.style.left=rnd(10,Math.max(10,window.innerWidth-size))+'px';
      c.style.top =rnd(80,Math.max(100,window.innerHeight-260))+'px';
      let t=Math.random()*6;
      function drift(){ if(!c.isConnected||c.classList.contains('pop'))return;
        t+=0.04; c.style.transform='rotate('+Math.sin(t)*12+'deg)'; requestAnimationFrame(drift);}
      requestAnimationFrame(drift);
      c.addEventListener('pointerdown',e=>{
        e.preventDefault(); e.stopPropagation();
        if(c.classList.contains('pop'))return;
        const r=c.getBoundingClientRect();
        burst(r.left+r.width/2,r.top+r.height/2);
        setScore(score+1);
        pet.classList.remove('nom'); void pet.offsetWidth; pet.classList.add('nom');
        chime();
        cheerText(pick(['Yum!','Nom nom!','Thank you!','Crunch!']));
        say(pick(['Yum yum','Thank you '+NAME,'Nom nom nom','Crunchy','Delicious']));
        c.classList.add('pop');
        c.addEventListener('animationend',()=>{c.remove(); spawnCarrot();},{once:true});
      });
      play.appendChild(c);
    }
    for(let i=0;i<3;i++) spawnCarrot();
    say('Feed the carrots to the bunny, '+NAME+'!');
  }

  // ---------- MODE: Catch Stars (catch stars, avoid rocks, don't let stars drop!) ----------
  function startStars(){
    applyScene(2);
    const STAR=['⭐','🌟','✨','💫'];
    const BAD=['🪨','☁️','💣','🍂'];
    function spawnFalling(){
      const isStar=Math.random()<0.68;
      const e=isStar?pick(STAR):pick(BAD);
      const s=document.createElement('div'); s.className='critter'; s.textContent=e;
      const size=rnd(64,104); s.style.fontSize=size+'px';
      const x=rnd(10,Math.max(10,window.innerWidth-size));
      s.style.left=x+'px'; let y=-size; s.style.top=y+'px';
      play.appendChild(s);
      const speed=rnd(1.6,3.0);
      const id=setInterval(()=>{
        if(!s.isConnected||s.classList.contains('pop')){clearInterval(id);return;}
        y+=speed; s.style.top=y+'px';
        s.style.transform='rotate('+(y/3)+'deg)';
        if(y>window.innerHeight){ clearInterval(id);
          if(isStar){ setScore(score-1); bonk(); cheerText('Missed! ⭐'); }
          s.remove(); }
      },16); trackTimer(id);
      s.addEventListener('pointerdown',ev=>{
        ev.preventDefault(); ev.stopPropagation();
        if(s.classList.contains('pop'))return;
        clearInterval(id);
        const r=s.getBoundingClientRect();
        if(isStar){ burst(r.left+r.width/2,r.top+r.height/2); setScore(score+1); reward({count:true}); }
        else { setScore(score-1); bonk(); cheerText('Oops! 💥'); say('Oops'); }
        s.classList.add('pop');
        s.addEventListener('animationend',()=>s.remove(),{once:true});
      });
    }
    const id=setInterval(spawnFalling, 850); trackTimer(id);
    for(let i=0;i<3;i++) spawnFalling();
    say('Catch the stars! Do not tap the rocks, '+NAME+'!');
  }

  // ---------- navigation ----------
  function goFullscreen(){
    const el = document.documentElement;
    const rfs = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
    if(rfs && !(document.fullscreenElement||document.webkitFullscreenElement)){
      try{ const p=rfs.call(el); if(p&&p.catch) p.catch(()=>{}); }catch(e){}
    }
  }
  function openMode(m){
    goFullscreen();
    initAudio();
    mode=m; setScore(0);
    play.innerHTML='';
    home.classList.add('hidden');
    play.classList.remove('hidden');
    topbar.style.display='flex';
    if(m==='friends') startFriends();
    else if(m==='balloons') startBalloons();
    else if(m==='feed') startFeed();
    else if(m==='stars') startStars();
  }
  function goHome(){
    clearTimers();
    if('speechSynthesis' in window) speechSynthesis.cancel();
    play.innerHTML='';
    play.classList.add('hidden');
    topbar.style.display='none';
    const lbl=document.querySelector('.scene-label'); if(lbl) lbl.remove();
    home.classList.remove('hidden');
    app.style.background='#ffd6ef';
    mode=null;
  }

  document.querySelectorAll('.menu-btn').forEach(btn=>{
    btn.addEventListener('pointerdown',e=>{ e.preventDefault(); openMode(btn.dataset.mode); });
  });
  backBtn.addEventListener('pointerdown',e=>{ e.preventDefault(); goHome(); });
  soundBtn.addEventListener('pointerdown',e=>{
    e.preventDefault(); soundOn=!soundOn;
    soundBtn.textContent = soundOn ? '🔊' : '🔇';
    if(soundOn) initAudio();
  });

  window.addEventListener('resize', ()=>{
    play.querySelectorAll('.critter').forEach(c=>{
      const size=parseFloat(c.style.fontSize)||90;
      const maxX=window.innerWidth-size;
      if(parseFloat(c.style.left)>maxX) c.style.left=Math.max(10,maxX)+'px';
    });
  });
})();
</script>
</body>
</html>
