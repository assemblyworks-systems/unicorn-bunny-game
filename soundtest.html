<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sound Test</title>
<style>
  body{ font-family:"Trebuchet MS",sans-serif; background:#ffe3f3; color:#5a2e52; margin:0; padding:18px; }
  h1{ color:#d44ea8; font-size:26px; }
  button{ display:block; width:100%; max-width:520px; font-family:inherit; font-size:22px; font-weight:bold;
    color:#fff; background:#ff79c6; border:none; border-radius:18px; padding:18px; margin:12px 0; box-shadow:0 5px 0 #d44ea8; }
  button:active{ transform:translateY(3px); box-shadow:0 2px 0 #d44ea8; }
  #log{ background:#fff; border-radius:14px; padding:12px; font-size:15px; white-space:pre-wrap;
    max-width:520px; min-height:120px; border:2px solid #f0c2e0; }
  .ok{ color:#1a8a3a; font-weight:bold; } .bad{ color:#c0392b; font-weight:bold; }
</style>
</head>
<body>
<h1>🔊 Sound Test</h1>
<p>Tap each button and tell me which ones you can hear. The box below shows what happened.</p>

<button id="b1">1 — Beep (Web Audio)</button>
<button id="b2">2 — Beep (HTML Audio)</button>
<button id="b3">3 — Talking (Speech)</button>

<div id="log">Ready. Tap a button…</div>

<script>
(function(){
  const log=document.getElementById('log');
  function L(msg,cls){ const t=new Date().toLocaleTimeString(); log.innerHTML += '\n['+t+'] '+(cls?'<span class="'+cls+'">'+msg+'</span>':msg); }
  function clearL(){ log.innerHTML='Status:'; }

  // ---- 1: Web Audio (what the app currently uses) ----
  let ctx=null;
  document.getElementById('b1').addEventListener('pointerdown',function(e){
    e.preventDefault(); clearL();
    try{
      if(!ctx) ctx=new (window.AudioContext||window.webkitAudioContext)();
      L('AudioContext created. state = '+ctx.state);
      const finish=()=>{
        L('after resume, state = '+ctx.state, ctx.state==='running'?'ok':'bad');
        const o=ctx.createOscillator(), g=ctx.createGain();
        o.type='sine'; o.frequency.value=660;
        g.gain.setValueAtTime(0.0001,ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.4,ctx.currentTime+0.02);
        g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.9);
        o.connect(g).connect(ctx.destination); o.start(); o.stop(ctx.currentTime+1.0);
        L('Played a 1-second beep. Did you HEAR it?');
      };
      const p=ctx.resume();
      if(p&&p.then) p.then(finish, err=>{ L('resume() FAILED: '+err,'bad'); }); else finish();
    }catch(err){ L('Web Audio ERROR: '+err,'bad'); }
  });

  // ---- 2: HTML Audio element (what YouTube-style playback uses) ----
  function beepWav(freq,ms){
    const rate=8000, n=Math.floor(rate*ms/1000); const buf=new Uint8Array(44+n*2);
    const dv=new DataView(buf.buffer);
    function s(o,str){ for(let i=0;i<str.length;i++) dv.setUint8(o+i,str.charCodeAt(i)); }
    s(0,'RIFF'); dv.setUint32(4,36+n*2,true); s(8,'WAVE'); s(12,'fmt '); dv.setUint32(16,16,true);
    dv.setUint16(20,1,true); dv.setUint16(22,1,true); dv.setUint32(24,rate,true); dv.setUint32(28,rate*2,true);
    dv.setUint16(32,2,true); dv.setUint16(34,16,true); s(36,'data'); dv.setUint32(40,n*2,true);
    for(let i=0;i<n;i++){ const v=Math.sin(2*Math.PI*freq*i/rate)*0.6*Math.min(1,(n-i)/(rate*0.1)); dv.setInt16(44+i*2, v*32767, true); }
    let bin=''; for(let i=0;i<buf.length;i++) bin+=String.fromCharCode(buf[i]);
    return 'data:audio/wav;base64,'+btoa(bin);
  }
  document.getElementById('b2').addEventListener('pointerdown',function(e){
    e.preventDefault(); clearL();
    try{
      const a=new Audio(beepWav(660,900)); a.volume=1.0;
      L('Created HTML Audio element. Playing…');
      const pr=a.play();
      if(pr&&pr.then) pr.then(()=>L('play() succeeded. Did you HEAR it?','ok'), err=>L('play() BLOCKED: '+err,'bad'));
      else L('play() called (no promise).');
    }catch(err){ L('HTML Audio ERROR: '+err,'bad'); }
  });

  // ---- 3: Speech synthesis (the talking voice) ----
  document.getElementById('b3').addEventListener('pointerdown',function(e){
    e.preventDefault(); clearL();
    if(!('speechSynthesis' in window)){ L('speechSynthesis NOT supported on this browser','bad'); return; }
    const voices=speechSynthesis.getVoices();
    L('speechSynthesis supported. Voices available: '+voices.length, voices.length?'ok':'bad');
    if(voices.length===0) L('No voices = no talking. The tablet may need a Text-to-Speech engine.','bad');
    try{
      const u=new SpeechSynthesisUtterance('Hello! Can you hear me talking?');
      u.rate=0.9; u.pitch=1.2; u.volume=1;
      u.onstart=()=>L('Speech STARTED. Did you hear talking?','ok');
      u.onend=()=>L('Speech ended.');
      u.onerror=(ev)=>L('Speech ERROR: '+ev.error,'bad');
      speechSynthesis.speak(u);
      L('Asked it to speak…');
    }catch(err){ L('Speech ERROR: '+err,'bad'); }
  });

  if('speechSynthesis' in window) speechSynthesis.onvoiceschanged=function(){};
})();
</script>
</body>
</html>
