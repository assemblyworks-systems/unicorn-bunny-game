<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Playbox</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#FFF9F0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Playbox">
<link rel="apple-touch-icon" href="icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="playbox.css">
<style>
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none; }
  html,body{ height:100%; overflow:hidden; touch-action:none; }
  body{ font-family:var(--font-body); background:var(--surface-app); color:var(--text-body); }
  #app{ position:fixed; inset:0; transition:background .6s ease; background:var(--surface-app); }

  /* top bar */
  #topbar{ position:fixed; top:0; left:0; right:0; height:68px; z-index:60; display:none; align-items:center; justify-content:space-between; padding:10px 14px 0; }
  .pill{ font-family:var(--font-display); font-size:20px; font-weight:800; color:var(--text-on-color); background:var(--color-grape); border:none; border-radius:var(--radius-pill); padding:10px 22px; box-shadow:0 var(--chunk-depth) 0 var(--color-grape-deep); cursor:pointer; transition:transform var(--dur-fast) var(--ease-out), box-shadow var(--dur-fast) var(--ease-out); }
  .pill:active{ transform:translateY(4px); box-shadow:0 var(--chunk-depth-press) 0 var(--color-grape-deep); }
  #starCount{ font-family:var(--font-display); background:var(--color-white); border-radius:var(--radius-pill); padding:8px 22px; font-size:24px; font-weight:800; color:var(--color-sunshine-deep); white-space:nowrap; box-shadow:var(--shadow-soft); cursor:pointer; }
  #starCount.bump{ animation:bump .4s; }
  @keyframes bump{ 0%,100%{transform:scale(1)} 50%{transform:scale(1.25)} }
  .iconbtn{ font-family:var(--font-display); font-size:22px; background:var(--color-white); border:none; border-radius:var(--radius-pill); padding:9px 15px; cursor:pointer; box-shadow:var(--shadow-soft); }

  .screen{ position:fixed; inset:0; }
  .hidden{ display:none !important; }

  /* home */
  #home{ display:flex; flex-direction:column; align-items:center; justify-content:flex-start; gap:10px; padding:22px 18px 30px; text-align:center; overflow-y:auto; }
  #home h1{ font-family:var(--font-display); font-size:34px; font-weight:800; color:var(--color-ink); line-height:1.1; }
  #home .hero{ animation:bob 1.7s ease-in-out infinite; filter:drop-shadow(0 8px 8px var(--tint-ink)); }
  #home .hero img{ width:92px; height:92px; }
  @keyframes bob{ 0%,100%{transform:translateY(0) rotate(-3deg)} 50%{transform:translateY(-14px) rotate(3deg)} }
  #menu{ display:grid; grid-template-columns:1fr 1fr; gap:14px; width:100%; max-width:560px; }
  .menu-btn{ font-family:var(--font-display); font-size:20px; font-weight:800; color:var(--tone-on,var(--text-on-color)); background:var(--tone,var(--color-sky)); border:none; border-radius:var(--radius-lg); padding:16px 10px 18px; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:6px; box-shadow:0 var(--chunk-depth) 0 var(--tone-deep,var(--color-sky-deep)); transition:transform var(--dur-fast) var(--ease-out), box-shadow var(--dur-fast) var(--ease-out); }
  .menu-btn .emo{ font-size:48px; line-height:1; }
  .menu-btn .emo img{ width:54px; height:54px; vertical-align:middle; }
  .menu-btn:active{ transform:translateY(4px); box-shadow:0 var(--chunk-depth-press) 0 var(--tone-deep,var(--color-sky-deep)); }
  .m1{--tone:var(--color-sunshine);--tone-deep:var(--color-sunshine-deep);--tone-on:var(--color-ink);}
  .m2{--tone:var(--color-bubblegum);--tone-deep:var(--color-bubblegum-deep);--tone-on:var(--color-white);}
  .m3{--tone:var(--color-sky);--tone-deep:var(--color-sky-deep);--tone-on:var(--color-white);}
  .m4{--tone:var(--color-grass);--tone-deep:var(--color-grass-deep);--tone-on:var(--color-white);}
  .homeRow{ display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
  .link-btn{ display:inline-flex; align-items:center; gap:8px; text-decoration:none; font-family:var(--font-display); font-size:18px; font-weight:800; color:var(--text-on-color); border-radius:var(--radius-pill); padding:12px 24px; box-shadow:0 var(--chunk-depth) 0 var(--color-grape-deep); cursor:pointer; transition:transform var(--dur-fast) var(--ease-out), box-shadow var(--dur-fast) var(--ease-out); }
  .link-btn:active{ transform:translateY(4px); }
  .purple{ background:var(--color-grape); box-shadow:0 var(--chunk-depth) 0 var(--color-grape-deep); }
  .purple:active{ box-shadow:0 var(--chunk-depth-press) 0 var(--color-grape-deep); }
  .blue{ background:var(--color-sky); box-shadow:0 var(--chunk-depth) 0 var(--color-sky-deep); }
  .blue:active{ box-shadow:0 var(--chunk-depth-press) 0 var(--color-sky-deep); }

  /* play */
  #play{ display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; padding:88px 14px 24px; }

  .targetCard{ background:var(--color-white); border-radius:var(--radius-lg); box-shadow:var(--shadow-pop); padding:14px 30px; display:flex; flex-direction:column; align-items:center; gap:4px; animation:popin .35s; }
  .targetCard .glyph{ font-family:var(--font-display); font-size:96px; font-weight:800; color:var(--color-grape); line-height:1; }

  #choices{ display:flex; flex-wrap:wrap; gap:18px; justify-content:center; }
  .choice{ font-family:var(--font-display); font-size:62px; font-weight:800; color:var(--color-ink); background:var(--color-white); border:none; border-radius:var(--radius-md); width:122px; height:122px; box-shadow:0 var(--chunk-depth) 0 var(--color-cream-deep); cursor:pointer; display:flex; align-items:center; justify-content:center; animation:popin .4s backwards; }
  .choice:active{ transform:translateY(4px); box-shadow:0 var(--chunk-depth-press) 0 var(--color-cream-deep); }
  .choice.wrong{ animation:wiggle .4s; }
  .choice.right{ animation:rightpop .6s; background:var(--color-grass-soft); box-shadow:0 var(--chunk-depth) 0 var(--color-grass-deep); }
  @keyframes popin{ 0%{transform:scale(.3); opacity:0} 70%{transform:scale(1.1)} 100%{transform:scale(1); opacity:1} }
  @keyframes wiggle{ 0%,100%{transform:translateX(0)} 25%{transform:translateX(-10px) rotate(-5deg)} 75%{transform:translateX(10px) rotate(5deg)} }
  @keyframes rightpop{ 0%{transform:scale(1)} 40%{transform:scale(1.3) rotate(6deg)} 100%{transform:scale(1)} }

  .picChoice{ flex-direction:column; gap:2px; width:auto; min-width:122px; max-width:165px; height:auto; min-height:122px; padding:12px 10px; }
  .picChoice .pic{ font-size:62px; line-height:1; animation:floaty 2.4s ease-in-out infinite; }
  .picChoice .cword{ font-family:var(--font-body); font-size:18px; font-weight:700; color:var(--text-muted); opacity:0; height:0; overflow:hidden; white-space:normal; transition:opacity .3s; }
  .picChoice .cword.show{ opacity:1; height:auto; margin-top:4px; }
  .picChoice .cword b{ color:var(--color-grape); font-size:24px; }
  @keyframes floaty{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }

  #countArea{ display:flex; flex-wrap:wrap; gap:8px; justify-content:center; align-items:center; max-width:92vw; max-height:36vh; overflow:hidden; }
  #countArea .obj{ font-size:46px; animation:dropin .4s backwards; }
  @keyframes dropin{ 0%{transform:translateY(-40px) scale(0); opacity:0} 60%{transform:translateY(6px) scale(1.15)} 100%{transform:translateY(0) scale(1); opacity:1} }

  .repeatBtn{ font-family:var(--font-display); font-size:48px; background:var(--color-bubblegum); color:var(--text-on-color); border:none; border-radius:50%; width:112px; height:112px; box-shadow:0 var(--chunk-depth) 0 var(--color-bubblegum-deep); cursor:pointer; display:flex; align-items:center; justify-content:center; animation:rpulse 1.7s ease-in-out infinite; }
  .repeatBtn:active{ transform:translateY(4px); box-shadow:0 var(--chunk-depth-press) 0 var(--color-bubblegum-deep); animation:none; }
  @keyframes rpulse{ 0%,100%{transform:scale(1)} 50%{transform:scale(1.09)} }

  /* trace */
  #traceWrap{ position:relative; width:min(80vw,440px); height:min(80vw,440px); background:var(--color-white); border-radius:var(--radius-lg); box-shadow:var(--shadow-pop); touch-action:none; }
  #traceCanvas,#guideCanvas{ position:absolute; inset:0; width:100%; height:100%; border-radius:var(--radius-lg); touch-action:none; }
  #guideCanvas{ pointer-events:none; }
  .startDot{ position:absolute; width:30px; height:30px; margin:-15px 0 0 -15px; border-radius:50%; background:var(--color-grass); box-shadow:0 0 0 6px rgba(95,201,123,.35); pointer-events:none; animation:spulse 1s ease-in-out infinite; z-index:5; }
  .startDot::after{ content:"👆"; position:absolute; left:24px; top:6px; font-size:26px; }
  @keyframes spulse{ 0%,100%{transform:scale(1)} 50%{transform:scale(1.3)} }
  .row{ display:flex; gap:14px; }

  /* mascot */
  #buddy{ position:fixed; bottom:10px; left:10px; z-index:40; filter:drop-shadow(0 6px 6px var(--tint-ink)); pointer-events:none; animation:bob 2s ease-in-out infinite; }
  #buddy img{ width:84px; height:84px; display:block; }
  #buddy.cheer{ animation:bjump .7s; }
  @keyframes bjump{ 0%{transform:translateY(0) scale(1)} 30%{transform:translateY(-40px) scale(1.2) rotate(-12deg)} 60%{transform:translateY(0) scale(1.1) rotate(10deg)} 100%{transform:translateY(0) scale(1)} }

  /* fx */
  .cheer{ position:fixed; left:50%; top:38%; transform:translate(-50%,-50%); font-family:var(--font-display); font-size:56px; font-weight:800; color:var(--color-white); pointer-events:none; z-index:80; text-shadow:0 3px 0 var(--color-bubblegum),0 0 16px rgba(255,255,255,.7); animation:cheer 1.2s ease-out forwards; white-space:nowrap; text-align:center; }
  @keyframes cheer{ 0%{transform:translate(-50%,-50%) scale(.2); opacity:0} 25%{transform:translate(-50%,-50%) scale(1.15); opacity:1} 100%{transform:translate(-50%,-80%) scale(1.15); opacity:0} }
  .confetti{ position:fixed; top:-30px; font-size:26px; pointer-events:none; z-index:75; will-change:transform; }
  .spark{ position:fixed; pointer-events:none; z-index:78; animation:spk .8s ease-out forwards; }
  @keyframes spk{ 0%{transform:translate(0,0) scale(.4); opacity:1} 100%{transform:translate(var(--dx),var(--dy)) scale(1.3); opacity:0} }
  .flyStick{ position:fixed; font-size:46px; z-index:85; pointer-events:none; transition:all .8s cubic-bezier(.4,0,.2,1); }

  /* board */
  #board{ display:flex; flex-direction:column; align-items:center; justify-content:flex-start; gap:16px; padding:88px 18px 24px; overflow:auto; }
  #board h2{ font-family:var(--font-display); font-size:30px; font-weight:800; color:var(--color-ink); }
  #board .count{ font-family:var(--font-display); font-size:22px; font-weight:700; color:var(--text-muted); }
  #stickerGrid{ display:flex; flex-wrap:wrap; gap:12px; justify-content:center; max-width:680px; }
  #stickerGrid .st{ font-size:46px; background:var(--color-white); border-radius:var(--radius-md); width:74px; height:74px; display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow-soft); animation:popin .4s backwards; }
  #board .empty{ font-family:var(--font-body); font-size:20px; font-weight:700; color:var(--text-muted); max-width:420px; text-align:center; }

  /* memory match */
  .memGrid{ display:flex; flex-wrap:wrap; gap:12px; justify-content:center; max-width:520px; }
  .memCard{ position:relative; width:108px; height:108px; border:none; border-radius:var(--radius-md); background:var(--color-grape); box-shadow:0 var(--chunk-depth) 0 var(--color-grape-deep); cursor:pointer; font-family:var(--font-display); display:flex; align-items:center; justify-content:center; }
  .memCard:active{ transform:translateY(4px); box-shadow:0 var(--chunk-depth-press) 0 var(--color-grape-deep); }
  .memCard .memBack{ font-size:46px; }
  .memCard .memFront{ display:none; font-size:54px; font-weight:800; color:var(--color-ink); flex-wrap:wrap; gap:5px; align-items:center; justify-content:center; width:100%; height:100%; padding:8px; }
  .memCard .memFront .d{ width:18px; height:18px; border-radius:50%; background:var(--color-grape); }
  .memCard.open{ background:var(--color-white); box-shadow:0 var(--chunk-depth) 0 var(--color-cream-deep); }
  .memCard.open .memBack{ display:none; }
  .memCard.open .memFront{ display:flex; }
  .memCard.done{ background:var(--color-grass-soft); box-shadow:0 var(--chunk-depth) 0 var(--color-grass-deep); animation:rightpop .5s; }

  /* dot to dot */
  #dotWrap{ position:relative; width:min(82vw,460px); height:min(82vw,460px); background:var(--color-white); border-radius:var(--radius-lg); box-shadow:var(--shadow-pop); touch-action:none; }
  #dotCanvas{ position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
  .dot{ position:absolute; width:48px; height:48px; margin:-24px 0 0 -24px; border-radius:50%; background:var(--color-white); border:4px solid var(--color-grape); color:var(--color-ink); font-family:var(--font-display); font-weight:800; font-size:22px; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:3; }
  .dot.next{ background:var(--color-grass); color:var(--text-on-color); border-color:var(--color-grass-deep); animation:spulse 1s ease-in-out infinite; }
  .dot.done{ background:var(--color-sunshine); border-color:var(--color-sunshine-deep); }

  /* sort it */
  .sortBins{ display:flex; gap:22px; justify-content:center; width:100%; max-width:560px; }
  .bin{ flex:1; min-height:150px; border-radius:var(--radius-lg); border:5px dashed var(--color-grape); background:rgba(255,255,255,.5); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; font-family:var(--font-display); font-weight:800; font-size:20px; color:var(--text-muted); transition:background .15s; }
  .bin .binlbl{ font-size:44px; }
  .bin.hot{ background:var(--color-grass-soft); border-color:var(--color-grass); border-style:solid; }
  #sortItems{ display:flex; flex-wrap:wrap; gap:14px; justify-content:center; min-height:110px; align-items:center; }
  .sortItem{ font-family:var(--font-display); font-size:54px; font-weight:800; color:var(--color-ink); background:var(--color-white); border-radius:var(--radius-md); width:92px; height:92px; display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow-soft); cursor:grab; touch-action:none; }
  .sortItem.dragging{ position:fixed; z-index:90; box-shadow:var(--shadow-float); cursor:grabbing; }

  /* profile gate */
  #homeSub{ font-family:var(--font-display); font-size:18px; font-weight:700; color:var(--color-grape); margin-top:-4px; }
  #gate{ display:flex; align-items:center; justify-content:center; padding:24px; z-index:100; background:var(--surface-app); }
  .gateCard{ background:var(--color-white); border-radius:var(--radius-xl); padding:32px 26px; max-width:430px; width:100%; text-align:center; box-shadow:var(--shadow-pop); display:flex; flex-direction:column; gap:16px; align-items:center; }
  .gateHero{ display:flex; gap:4px; align-items:flex-end; animation:bob 1.6s ease-in-out infinite; }
  .gateHero img{ width:88px; height:88px; }
  .gateTitle{ font-family:var(--font-display); font-size:34px; font-weight:800; color:var(--color-ink); }
  .gateSub{ font-family:var(--font-body); font-size:20px; font-weight:700; color:var(--text-muted); }
  #gateName{ font-family:var(--font-body); font-weight:700; font-size:22px; text-align:center; padding:14px 18px; border:3px solid var(--color-line); border-radius:var(--radius-md); width:100%; outline:none; color:var(--color-ink); background:var(--surface-sunk); }
  #gateName:focus{ border-color:var(--color-sky); }
  .gateBtn{ font-family:var(--font-display); font-size:24px; font-weight:800; color:var(--text-on-color); background:var(--color-coral); border:none; border-radius:var(--radius-pill); padding:14px 32px; box-shadow:0 var(--chunk-depth) 0 var(--color-coral-deep); cursor:pointer; transition:transform var(--dur-fast) var(--ease-out), box-shadow var(--dur-fast) var(--ease-out); }
  .gateBtn:active{ transform:translateY(4px); box-shadow:0 var(--chunk-depth-press) 0 var(--color-coral-deep); }
  .gateErr{ font-family:var(--font-body); font-size:18px; font-weight:700; color:var(--color-coral-deep); min-height:22px; }
</style>
</head>
<body>
<div id="app">

  <!-- GATE (shown until a valid profile is entered) -->
  <div id="gate" class="screen">
    <div class="gateCard">
      <div class="gateHero"><img src="img/rex-dino.svg" alt=""><img src="img/mascot-boxy.svg" alt=""></div>
      <h1 class="gateTitle">Welcome!</h1>
      <p class="gateSub">Who's playing today?</p>
      <input id="gateName" type="text" inputmode="text" autocomplete="off" autocapitalize="words" placeholder="Type your name" />
      <button id="gateGo" class="gateBtn">Let's Play! ▶</button>
      <div id="gateErr" class="gateErr"></div>
    </div>
  </div>

  <div id="topbar">
    <button id="backBtn" class="pill">⟵ Home</button>
    <div id="starCount">⭐ 0</div>
    <button id="soundBtn" class="iconbtn">🔊</button>
  </div>

  <!-- HOME -->
  <div id="home" class="screen hidden">
    <div class="hero"><img src="img/mascot-boxy.svg" alt=""></div>
    <h1 id="homeTitle">Playbox</h1>
    <div id="homeSub">📚 ABC &amp; 123</div>
    <div id="menu">
      <button class="menu-btn m1" data-mode="find"><span class="emo">🔍</span>Find It</button>
      <button class="menu-btn m2" data-mode="sounds"><span class="emo">🍎</span>A is for…</button>
      <button class="menu-btn m3" data-mode="trace"><span class="emo">✏️</span>Trace It</button>
      <button class="menu-btn m4" data-mode="count"><span class="emo">🍓</span>Count It</button>
      <button class="menu-btn m3" data-mode="memory"><span class="emo">🧠</span>Memory</button>
      <button class="menu-btn m4" data-mode="dots"><span class="emo">🔗</span>Dot to Dot</button>
      <button class="menu-btn m1" data-mode="sort"><span class="emo">🗂️</span>Sort It</button>
      <button class="menu-btn m2" data-mode="shapes"><span class="emo">🔷</span>Shapes</button>
      <button class="menu-btn m3" data-mode="dinocount"><span class="emo">🦕</span>Count Dinos</button>
    </div>
    <div class="homeRow">
      <button class="link-btn purple" id="boardBtn">🎁 My Stickers</button>
      <a class="link-btn blue" href="index.html">🦄 Play Games</a>
      <button class="link-btn" id="profileBtn" style="background:#ff9ad5;box-shadow:0 5px 0 #d44ea8;">👤 Change Profile</button>
    </div>
  </div>

  <!-- PLAY -->
  <div id="play" class="screen hidden"></div>

  <!-- BOARD -->
  <div id="board" class="screen hidden">
    <h2>🎁 My Sticker Board</h2>
    <div class="count" id="boardCount"></div>
    <div id="stickerGrid"></div>
  </div>

  <div id="buddy"><img src="img/rex-dino.svg" alt=""></div>
</div>

<script>
(function(){
  const app=document.getElementById('app');
  const home=document.getElementById('home');
  const play=document.getElementById('play');
  const board=document.getElementById('board');
  const topbar=document.getElementById('topbar');
  const backBtn=document.getElementById('backBtn');
  const soundBtn=document.getElementById('soundBtn');
  const starCount=document.getElementById('starCount');
  const boardBtn=document.getElementById('boardBtn');
  const buddy=document.getElementById('buddy');
  const gate=document.getElementById('gate');
  const gateName=document.getElementById('gateName');
  const gateGo=document.getElementById('gateGo');
  const gateErr=document.getElementById('gateErr');
  const profileBtn=document.getElementById('profileBtn');
  const homeTitle=document.getElementById('homeTitle');

  // ---------- profile gate (client-side soft gate; shared with index.html) ----------
  const PKEY='playbox_profile_v1';
  const ALLOWED=['Avalynn','Raynice','Sophia'];
  function loadProfile(){ try{ return JSON.parse(localStorage.getItem(PKEY)); }catch(e){ return null; } }
  function saveProfile(p){ try{ localStorage.setItem(PKEY, JSON.stringify(p)); }catch(e){} }
  function matchProfile(input){
    const s=(input||'').trim().replace(/\s+/g,' ');
    const low=s.toLowerCase();
    let first=null;
    for(const n of ALLOWED){ if(low.indexOf(n.toLowerCase())===0){ first=n; break; } }
    if(!first) return null;
    const full=s.split(' ').map(w=> w ? w.charAt(0).toUpperCase()+w.slice(1).toLowerCase() : w).join(' ');
    return { full:full, first:first };
  }
  function applyProfile(p){
    homeTitle.textContent=p.full+"'s Playbox";
    try{ document.title=p.full+"'s Playbox"; }catch(e){}
    gate.classList.add('hidden');
    home.classList.remove('hidden');
  }
  function showGate(){
    home.classList.add('hidden'); play.classList.add('hidden'); board.classList.add('hidden');
    topbar.style.display='none'; buddy.style.display='none';
    gate.classList.remove('hidden'); gateErr.textContent='';
    if(gateName){ gateName.value=''; try{ gateName.focus(); }catch(e){} }
  }
  function submitGate(){
    const p=matchProfile(gateName.value);
    if(!p){ gateErr.textContent='Profile not authorised.'; return; }
    saveProfile(p); applyProfile(p);
  }
  function changeProfile(){
    try{ localStorage.removeItem(PKEY); }catch(e){}
    store={count:0,board:[]}; renderStars();
    goHome(); showGate();
  }

  // ---------- content ----------
  const UPPER='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

    cards.forEach(c=>{
      const el=document.createElement('button'); el.className='memCard'; el.dataset.key=c.key;
      const back=document.createElement('span'); back.className='memBack'; back.textContent='❓';
      const front=document.createElement('span'); front.className='memFront';
      if(c.type==='dots'){ for(let i=0;i<c.val;i++){ const d=document.createElement('span'); d.className='d'; front.appendChild(d); } }
      else front.textContent=c.val;
      el.appendChild(back); el.appendChild(front);
      onTap(el,()=>{
        if(roundLock||el.classList.contains('open')||el.classList.contains('done')) return;
        el.classList.add('open'); blip(); flipped.push(el);
        if(flipped.length===2){
          roundLock=true; const a=flipped[0], b=flipped[1];
          if(a.dataset.key===b.dataset.key){
            setTimeout(()=>{ a.classList.add('done'); b.classList.add('done'); win(); matched++; flipped=[]; roundLock=false; if(matched>=cards.length/2){ const t=setTimeout(memoryRound,1300); trackT(t);} },450);
          } else {
            setTimeout(()=>{ a.classList.remove('open'); b.classList.remove('open'); boop(); flipped=[]; roundLock=false; },950);
          }
        }
      });
      grid.appendChild(el);
    });
    speak(useNum?'Match the number to the dots!':'Match the big and little letters!');
  }

  // ================= DOT TO DOT =================
  const DOTSHAPES=[
    {name:'a triangle', emoji:'🔺', pts:[[0.5,0.22],[0.8,0.75],[0.2,0.75]]},
    {name:'a square', emoji:'🟦', pts:[[0.28,0.28],[0.72,0.28],[0.72,0.72],[0.28,0.72]]},
    {name:'a diamond', emoji:'🔷', pts:[[0.5,0.18],[0.82,0.5],[0.5,0.82],[0.18,0.5]]},
    {name:'a house', emoji:'🏠', pts:[[0.5,0.16],[0.8,0.42],[0.8,0.8],[0.2,0.8],[0.2,0.42]]},
    {name:'a boat', emoji:'⛵', pts:[[0.5,0.2],[0.85,0.62],[0.7,0.82],[0.3,0.82],[0.15,0.62]]},
    {name:'a fish', emoji:'🐟', pts:[[0.18,0.5],[0.45,0.32],[0.7,0.45],[0.85,0.3],[0.85,0.7],[0.7,0.55],[0.45,0.68]]},
    {name:'a star', emoji:'⭐', pts:[[0.5,0.12],[0.61,0.38],[0.9,0.38],[0.67,0.57],[0.76,0.86],[0.5,0.68],[0.24,0.86],[0.33,0.57],[0.1,0.38],[0.39,0.38]]},
    {name:'a dinosaur', emoji:'🦕', pts:[[0.13,0.34],[0.24,0.18],[0.46,0.36],[0.66,0.36],[0.93,0.56],[0.66,0.80],[0.54,0.62],[0.42,0.80],[0.34,0.50]]}
  ];
  let dotShape=null, dotNext=1;
  function startDots(){ dotsRound(); }
  function dotsRound(){
    play.innerHTML=''; roundLock=false;
    dotShape=pick(DOTSHAPES); dotNext=1;
    const wrap=document.createElement('div'); wrap.id='dotWrap';
    const cv=document.createElement('canvas'); cv.id='dotCanvas'; wrap.appendChild(cv);
    play.appendChild(wrap);
    const sayIt=()=>speak('Connect the dots! Start at number one.');
    play.appendChild(makeRepeat(sayIt));
    setTimeout(()=>setupDots(wrap,cv),60);
    setTimeout(()=>{ if(!wrap.querySelector('.dot')) setupDots(wrap,cv); },320);
    speak('Connect the dots to make '+dotShape.name+'! Start at number one.');
  }
  function setupDots(wrap,cv){
    const rect=wrap.getBoundingClientRect(); if(rect.width<10) return;
    const dpr=window.devicePixelRatio||1; cv.width=rect.width*dpr; cv.height=rect.height*dpr;
    const ctx=cv.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0); ctx.clearRect(0,0,rect.width,rect.height);
    ctx.lineWidth=6; ctx.strokeStyle='#ff79c6'; ctx.lineCap='round'; ctx.lineJoin='round';
    wrap.querySelectorAll('.dot').forEach(d=>d.remove());
    dotShape.pts.forEach((p,i)=>{
      const b=document.createElement('button'); b.className='dot'+(i===0?' next':''); b.textContent=(i+1); b.dataset.idx=(i+1);
      b.style.left=(p[0]*rect.width)+'px'; b.style.top=(p[1]*rect.height)+'px';
      onTap(b,()=>{
        const idx=+b.dataset.idx;
        if(idx!==dotNext){ boop(); b.animate([{transform:'translate(-24px,-24px) scale(1)'},{transform:'translate(-24px,-24px) scale(1.25)'},{transform:'translate(-24px,-24px) scale(1)'}],{duration:300}); return; }
        blip(); speak(String(idx)); b.classList.remove('next'); b.classList.add('done');
        if(idx>1){ const pr=dotShape.pts[idx-2], cu=dotShape.pts[idx-1]; ctx.beginPath(); ctx.moveTo(pr[0]*rect.width,pr[1]*rect.height); ctx.lineTo(cu[0]*rect.width,cu[1]*rect.height); ctx.stroke(); }
        dotNext++;
        if(dotNext>dotShape.pts.length){
          const a=dotShape.pts[dotShape.pts.length-1], z=dotShape.pts[0];
          ctx.beginPath(); ctx.moveTo(a[0]*rect.width,a[1]*rect.height); ctx.lineTo(z[0]*rect.width,z[1]*rect.height); ctx.stroke();
          const em=document.createElement('div'); em.textContent=dotShape.emoji; em.style.cssText='position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:130px;z-index:6;';
          wrap.appendChild(em); em.animate([{opacity:0,transform:'translate(-50%,-50%) scale(0)'},{opacity:1,transform:'translate(-50%,-50%) scale(1.1)'}],{duration:600,fill:'forwards'});
          win('You made '+dotShape.name+'!'); speak('Yay! You made '+dotShape.name+'!', function(){ trackT(setTimeout(dotsRound,500)); });
        } else { const nx=wrap.querySelector('.dot[data-idx="'+dotNext+'"]'); if(nx) nx.classList.add('next'); }
      });
      wrap.appendChild(b);
    });
  }

  // ================= SORT IT =================
  function mkBin(lbl,name,word){ const b=document.createElement('div'); b.className='bin'; b.dataset.key=name; const s=document.createElement('div'); s.className='binlbl'; s.textContent=lbl; b.appendChild(s); const n=document.createElement('div'); n.textContent=word; b.appendChild(n); return b; }
  function makeDraggable(el,bins,onDrop){
    let active=null, ox=0, oy=0, binCache=null;   // binCache: bin rects captured once per drag (no per-move layout reads)
    function hitBin(x,y){ if(!binCache) return null; for(const b of binCache){ const r=b.r; if(x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom) return b; } return null; }
    function reset(){ el.classList.remove('dragging'); el.style.left=''; el.style.top=''; el.style.width=''; el.style.height=''; }
    el.addEventListener('pointerdown',e=>{ if(active!==null) return; e.preventDefault(); active=e.pointerId;
      const r=el.getBoundingClientRect(); ox=e.clientX-r.left; oy=e.clientY-r.top;
      el.classList.add('dragging'); el.style.width=r.width+'px'; el.style.height=r.height+'px'; el.style.left=r.left+'px'; el.style.top=r.top+'px';
      binCache=[...bins.querySelectorAll('.bin')].map(b=>({el:b, key:b.dataset.key, r:b.getBoundingClientRect()}));
      try{el.setPointerCapture(e.pointerId);}catch(_){}}, false);
    el.addEventListener('pointermove',e=>{ if(e.pointerId!==active) return; e.preventDefault();
      el.style.left=(e.clientX-ox)+'px'; el.style.top=(e.clientY-oy)+'px';
      const ob=hitBin(e.clientX,e.clientY); if(binCache) binCache.forEach(b=>b.el.classList.toggle('hot',b===ob)); });
    el.addEventListener('pointerup',e=>{ if(e.pointerId!==active) return; active=null;
      if(binCache) binCache.forEach(b=>b.el.classList.remove('hot'));
      const ob=hitBin(e.clientX,e.clientY); binCache=null; let ok=false; if(ob) ok=onDrop(ob.key);
      if(!ok){ reset(); boop(); } });
    el.addEventListener('pointercancel',()=>{ active=null; binCache=null; reset(); });
  }
  function startSort(){ sortRound(); }
  function sortRound(){
    play.innerHTML=''; roundLock=false;
    const useColor=Math.random()<0.4;
    const items=document.createElement('div'); items.id='sortItems';
    const bins=document.createElement('div'); bins.className='sortBins';
    let list=[]; let sayIt;
    if(useColor){
      const two=shuffle([['red','🔴'],['blue','🔵'],['yellow','🟡'],['green','🟢']]).slice(0,2);
      bins.appendChild(mkBin(two[0][1],two[0][0],two[0][0])); bins.appendChild(mkBin(two[1][1],two[1][0],two[1][0]));
      for(let i=0;i<6;i++){ const t=pick(two); list.push({emo:t[1],key:t[0]}); }
      sayIt=()=>speak('Drag each one to the matching color box!');
    } else {
      bins.appendChild(mkBin('🔤','letters','letters')); bins.appendChild(mkBin('🔢','numbers','numbers'));
      shuffle([...shuffle(UPPER).slice(0,3),...shuffle(NUMS).slice(0,3)]).forEach(v=>list.push({emo:v,key:isNum(v)?'numbers':'letters'}));
      sayIt=()=>speak('Put the letters and numbers in the right box!');
    }
    let remaining=list.length;
    list.forEach(it=>{ const el=document.createElement('div'); el.className='sortItem'; el.textContent=it.emo;
      makeDraggable(el,bins,(binKey)=>{ if(binKey===it.key){ el.remove(); win(); remaining--; if(remaining<=0){ const t=setTimeout(sortRound,1100); trackT(t);} return true; } return false; });
      items.appendChild(el); });
    play.appendChild(items); play.appendChild(makeRepeat(sayIt)); play.appendChild(bins);
    sayIt();
  }

  // ================= SHAPES & COLORS =================
  const SHP=[['circle','🔵'],['square','🟦'],['triangle','🔺'],['star','⭐'],['heart','❤️'],['diamond','🔷']];
  const COL=[['red','🔴'],['orange','🟠'],['yellow','🟡'],['green','🟢'],['blue','🔵'],['purple','🟣']];
  function startShapes(){ shapesRound(); }
  function shapesRound(){
    play.innerHTML=''; roundLock=false;
    const useColor=Math.random()<0.5; const set=useColor?COL:SHP;
    const tgt=pick(set);
    const opts=shuffle([tgt,...shuffle(set.filter(s=>s[0]!==tgt[0])).slice(0,2)]);
    const sayIt=()=>speak('Find the '+tgt[0]+(useColor?' one':'')+'!');
    const head=document.createElement('div'); head.className='targetCard';
    const g=document.createElement('div'); g.style.cssText='font-size:26px;color:#7a2e6b;font-weight:bold;padding:6px 10px;'; g.textContent=useColor?'Which color?':'Which shape?'; head.appendChild(g);
    play.appendChild(head); play.appendChild(makeRepeat(sayIt));
    const ch=document.createElement('div'); ch.id='choices';
    opts.forEach((o,i)=>{ const b=document.createElement('button'); b.className='choice'; b.textContent=o[1]; b.style.animationDelay=(i*0.08)+'s';
      onTap(b,()=>{ if(roundLock) return;
        if(o[0]===tgt[0]){ roundLock=true; b.classList.add('right'); win(); speak('Yes! '+tgt[0]+'!', function(){ trackT(setTimeout(shapesRound,450)); }); }
        else { b.classList.add('wrong'); boop(); speak(rand(TRYAGAIN)); setTimeout(()=>b.classList.remove('wrong'),420); } });
      ch.appendChild(b); });
    play.appendChild(ch); sayIt();
  }

  // ---------- repeat button ----------
  function makeRepeat(fn){ const b=document.createElement('button'); b.className='repeatBtn'; b.textContent='🔊'; b.setAttribute('aria-label','Repeat'); onTap(b,()=>{ initAudio(); fn(); }); return b; }

  // ---------- wiring ----------
  document.querySelectorAll('.menu-btn').forEach(btn=>{ onTap(btn,()=>openMode(btn.dataset.mode)); });
  onTap(backBtn,goHome);
  onTap(boardBtn,showBoard);
  onTap(starCount,showBoard);
  onTap(soundBtn,()=>{ soundOn=!soundOn; soundBtn.textContent=soundOn?'🔊':'🔇'; if(!soundOn&&'speechSynthesis' in window) speechSynthesis.cancel(); if(soundOn) initAudio(); });
  window.addEventListener('resize',()=>{ if(mode==='trace'&&cur) setupTrace(cur); });

  // gate + profile wiring
  if(gateGo){ gateGo.addEventListener('click',e=>{ e.preventDefault(); submitGate(); }); }
  if(gateName){ gateName.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); submitGate(); } }); }
  onTap(profileBtn,changeProfile);

  renderStars();
  (function(){ const _p=loadProfile(); if(_p && _p.first) applyProfile(_p); else showGate(); })();
})();
</script>
<script>if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(function(){}); }</script>
